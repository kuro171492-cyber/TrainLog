<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker - File Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0b1120;
            color: #f1f5f9;
        }
        
        .editable:focus { outline: none; border-bottom: 1px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
        
        [contenteditable]:empty:before {
            content: attr(placeholder);
            color: #64748b;
            font-style: italic;
        }

        .set-input { 
            width: 55px; 
            text-align: center; 
            border-bottom: 1px solid #334155; 
            font-size: 0.8rem; 
            color: #f1f5f9; 
            background: transparent;
            cursor: pointer;
        }
        
        /* Dropdowns */
        .custom-dropdown {
            display: none;
            position: absolute;
            z-index: 9999;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 12px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }
        .custom-dropdown.active { display: flex; }
        .dropdown-column { max-height: 280px; overflow-y: auto; border-right: 1px solid #334155; }
        .dropdown-item {
            padding: 10px 15px;
            color: #f1f5f9;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
        }
        .dropdown-item:hover { background: #3b82f6; color: white; }
        
        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 600;
            z-index: 2000;
            transition: transform 0.3s ease;
        }
        #toast.active { transform: translateX(-50%) translateY(0); }
        
        .room { display: none; }
        .room.active { display: block; }

        /* Template UI */
        .template-card {
            background-color: #1e293b;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 16px;
        }
        .template-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #334155;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            outline: none;
            padding-bottom: 4px;
        }
        .template-name-input:focus { border-bottom-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="toast">Успешно!</div>
    <!-- Hidden input for file import -->
    <input type="file" id="fileImportInput" class="hidden" accept=".json" onchange="importData(event)">

    <!-- Dropdowns -->
    <div id="dateDropdown" class="custom-dropdown"><div class="dropdown-column" style="min-width: 60px;" id="dayList"></div><div class="dropdown-column" style="min-width: 100px;" id="monthList"></div><div class="dropdown-column" style="min-width: 80px;" id="yearList"></div></div>
    <div id="weekdayDropdown" class="custom-dropdown"><div class="dropdown-column" style="min-width: 150px;" id="weekdayList"></div></div>
    <div id="totalTimeDropdown" class="custom-dropdown"><div class="dropdown-column" id="totalHoursList"></div><div class="dropdown-column" id="totalMinList"></div></div>
    <div id="exerciseTimeDropdown" class="custom-dropdown"><div class="dropdown-column" id="minList"></div><div class="dropdown-column" id="secList"></div></div>
    <div id="weightDropdown" class="custom-dropdown"><div class="dropdown-column" style="min-width: 75px;" id="tensList"></div><div class="dropdown-column" style="min-width: 75px;" id="unitsList"></div></div>
    <div id="repsDropdown" class="custom-dropdown"><div class="dropdown-column" style="min-width: 80px;" id="repsList"></div></div>

    <nav class="sticky top-0 z-50 bg-[#0b1120]/95 backdrop-blur-xl border-b border-slate-800/50 px-4 py-4 mb-6">
        <div class="max-w-xl mx-auto flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-600/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline></svg>
                    </div>
                    <h1 class="text-xl font-bold uppercase tracking-tight">Train<span class="text-blue-500">Log</span></h1>
                </div>
                
                <div class="flex items-center gap-2">
                    <!-- File Actions -->
                    <button onclick="exportData()" title="Экспорт в файл" class="p-2 text-slate-400 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    </button>
                    <button onclick="triggerImport()" title="Импорт из файла" class="p-2 text-slate-400 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </button>
                    <button onclick="handleGitHubSyncClick()" title="Синхронизация с GitHub" class="p-2 text-slate-400 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6M8 4h8a2 2 0 012 2v12a2 2 0 01-2 2H8a2 2 0 01-2-2V6a2 2 0 012-2z"/></svg>
                    </button>
                    <div class="w-px h-6 bg-slate-800 mx-1"></div>
                    <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                        <button id="btnLog" onclick="switchRoom('log')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white">Лог</button>
                        <button id="btnTable" onclick="switchRoom('table')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400">Аналитика</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4">
        <div id="roomLog" class="room active space-y-4">
            <div class="flex justify-between items-center mb-6">
                 <p class="text-[11px] text-slate-500 font-bold uppercase tracking-widest">Твоя активность</p>
                 <button onclick="addDay()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-blue-600/20 active:scale-95 transition-all">
                    + Новая сессия
                </button>
            </div>
            <div id="daysContainer" class="space-y-4"></div>
        </div>

        <div id="roomTable" class="room space-y-6">
            <div class="bg-[#161f32] rounded-[32px] border border-slate-800 shadow-xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-sm font-black uppercase tracking-widest text-blue-500">Прогресс</h2>
                    <select id="chartExerciseSelect" onchange="updateAnalyticsChart()" class="bg-slate-900 border border-slate-700 text-white text-[11px] font-bold py-1.5 px-4 rounded-xl outline-none min-w-[140px]"></select>
                </div>
                <div class="relative h-[240px] w-full">
                    <canvas id="progressionChart"></canvas>
                </div>
            </div>
            <div class="bg-[#161f32] rounded-[32px] border border-slate-800 shadow-xl overflow-hidden">
                <div class="p-6 border-b border-slate-800/40"><h2 class="text-sm font-black uppercase tracking-widest text-white">История</h2></div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-900/50 text-slate-500 uppercase font-black">
                            <tr><th class="p-4">Дата</th><th class="p-4">Упражнение</th><th class="p-4">Результат</th></tr>
                        </thead>
                        <tbody id="analyticsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Template Library Modal -->
    <div id="templateModal" class="modal-overlay">
        <div class="bg-[#111827] rounded-[32px] border border-slate-800/60 max-w-lg w-full mx-4 overflow-hidden flex flex-col max-h-[90vh] shadow-2xl">
            <div class="p-6 border-b border-slate-800/40 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold text-white">Шаблоны</h3>
                    <p class="text-slate-500 text-[11px] mt-1">Редактируйте названия и применяйте</p>
                </div>
                <button onclick="closeModal('templateModal')" class="text-slate-500 hover:text-white p-2">&times;</button>
            </div>
            <div id="templateList" class="p-5 overflow-y-auto space-y-4 bg-[#0b1120]/30"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'workout_v4_data';
        const TEMPLATE_KEY = 'workout_v4_templates';
        const GITHUB_SYNC_KEY = 'trainlog_github_sync_v1';
        const GITHUB_DATA_FILE = 'trainlog_data.json';
        const MONTHS = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        const MONTH_INDEX = Object.fromEntries(MONTHS.map((m, i) => [m, i]));
        const WEEKDAYS = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];

        let activeInput = null;
        let activeSessionIdForTemplate = null;
        let workoutChart = null;
        let githubSyncConfig = null;

        const dropdowns = {
            date: document.getElementById('dateDropdown'),
            weekday: document.getElementById('weekdayDropdown'),
            total: document.getElementById('totalTimeDropdown'),
            exercise: document.getElementById('exerciseTimeDropdown'),
            weight: document.getElementById('weightDropdown'),
            reps: document.getElementById('repsDropdown')
        };

        window.addEventListener('DOMContentLoaded', async () => {
            initDropdownOptions();
            githubSyncConfig = getGitHubSyncConfig();
            await loadFromStorage();
        });

        // --- FILE STORAGE FUNCTIONS ---
        function exportData() {
            const data = {
                workouts: JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'),
                templates: JSON.parse(localStorage.getItem(TEMPLATE_KEY) || '[]'),
                exportDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `trainlog_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("Данные экспортированы");
        }

        function triggerImport() {
            document.getElementById('fileImportInput').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.workouts || !data.templates) throw new Error("Неверный формат файла");
                    
                    if (confirm("Это заменит все текущие данные. Продолжить?")) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.workouts));
                        localStorage.setItem(TEMPLATE_KEY, JSON.stringify(data.templates));
                        saveDataToGitHub(data).catch(() => {});
                        location.reload();
                    }
                } catch (err) {
                    showToast("Ошибка при импорте");
                }
            };
            reader.readAsText(file);
        }

        // --- CORE UI LOGIC ---
        function switchRoom(room) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
            if (room === 'log') {
                document.getElementById('roomLog').classList.add('active');
                document.getElementById('btnLog').className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white";
                document.getElementById('btnTable').className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400";
            } else {
                renderAnalytics();
                document.getElementById('roomTable').classList.add('active');
                document.getElementById('btnTable').className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white";
                document.getElementById('btnLog').className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-400";
            }
        }

        function addDay(data = null, insertAtTop = true) {
            const id = data?.id || Date.now();
            const now = new Date();
            const date = data?.dateObj || { d: now.getDate(), m: MONTHS[now.getMonth()], y: now.getFullYear(), wd: WEEKDAYS[(now.getDay() + 6) % 7] };
            
            const card = document.createElement('div');
            card.className = "day-card bg-[#161f32] rounded-[32px] border border-slate-800/60 shadow-xl overflow-hidden mb-6 transition-all";
            card.dataset.id = id;
            card.innerHTML = `
                <div class="p-6 cursor-pointer hover:bg-slate-800/10" onclick="toggleCollapse(this)">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2 bg-[#0f172a] border border-slate-800 p-1.5 rounded-2xl" onclick="event.stopPropagation()">
                            <div class="date-container flex items-center gap-1 px-3 py-1 bg-slate-800 rounded-xl text-xs font-bold text-white cursor-pointer" onclick="openDropdown(event, 'date')">
                                <span data-type="d">${date.d}</span> <span data-type="m">${date.m}</span> <span data-type="y">${date.y}</span>
                            </div>
                            <div class="weekday-value text-xs font-bold text-slate-500 px-3 py-1 cursor-pointer hover:text-white" onclick="openDropdown(event, 'weekday')">
                                ${date.wd}
                            </div>
                        </div>
                        <div class="flex gap-2" onclick="event.stopPropagation()">
                            <button onclick="saveSessionAsTemplate(${id})" class="p-2.5 bg-slate-800/40 text-slate-400 hover:text-blue-400 rounded-xl border border-slate-800 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                            </button>
                            <button onclick="openTemplateModal(${id})" class="p-2.5 bg-blue-600/10 text-blue-500 hover:bg-blue-600/20 rounded-xl border border-blue-500/20 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-[#0f172a] border border-slate-800 rounded-xl px-4 py-2 w-fit" onclick="event.stopPropagation()">
                        <span class="text-[9px] font-black text-slate-600 uppercase">Время:</span>
                        <input type="text" readonly class="bg-transparent text-blue-400 font-mono font-bold text-xs w-12 text-center outline-none cursor-pointer" onclick="openDropdown(event, 'total')" data-type="total-time" value="${data?.totalTime || '01:00'}">
                    </div>
                </div>
                <div class="day-content p-6 pt-0 border-t border-slate-800/40">
                    <div class="exercise-list space-y-4 pt-4"></div>
                    <div class="mt-8 flex justify-between items-center">
                        <div class="flex gap-2">
                            <button onclick="addExerciseByBtn(this)" class="bg-slate-800/50 text-slate-400 border border-slate-800 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-slate-700 transition-all">+ УПР</button>
                            <button onclick="addSupersetByBtn(this)" class="bg-blue-600/10 text-blue-500 border border-blue-500/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-blue-600/20 transition-all">+ БЛОК</button>
                        </div>
                        <button onclick="deleteDay(${id})" class="p-2 text-slate-600 hover:text-red-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>
            `;
            const container = document.getElementById('daysContainer');
            if (insertAtTop) container.prepend(card);
            else container.appendChild(card);
            const list = card.querySelector('.exercise-list');
            if (data?.items) data.items.forEach(i => i.type === 'superset' ? renderSuperset(list, i) : renderExercise(list, i));
            else renderExercise(list);
            autoSave();
        }

        function renderExercise(container, data = null, isSub = false) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl ${isSub ? 'bg-blue-600/5 border border-blue-500/10' : 'bg-slate-800/20 border border-slate-800/50'} space-y-4`;
            div.dataset.type = 'exercise';
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="editable flex-1 bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-2.5 text-sm font-bold text-white outline-none" contenteditable="true" oninput="autoSave()" placeholder="Упражнение...">${data?.name || ''}</div>
                    <button onclick="this.closest('[data-type]').remove(); autoSave();" class="text-slate-600 hover:text-red-500">&times;</button>
                </div>
                <div class="sets-container space-y-2"></div>
                <button onclick="addSetToBtn(this)" class="text-[9px] text-blue-500 font-black uppercase tracking-widest px-2 py-1">+ подход</button>
            `;
            const sets = div.querySelector('.sets-container');
            if (data?.sets) data.sets.forEach(s => sets.appendChild(createSet(s.w, s.r, s.t)));
            else sets.appendChild(createSet());
            container.appendChild(div);
        }

        function renderSuperset(container, data = null) {
            const div = document.createElement('div');
            div.className = "p-4 rounded-2xl border-l-4 border-blue-600 bg-blue-600/[0.03] space-y-4";
            div.dataset.type = "superset";
            div.innerHTML = `
                <div class="flex justify-between items-center px-1"><span class="text-[9px] font-black text-blue-600 uppercase">БЛОК</span><button onclick="this.closest('[data-type]').remove(); autoSave();" class="text-slate-600">&times;</button></div>
                <div class="superset-inner space-y-4"></div>
                <button onclick="addExToSuperset(this)" class="text-[9px] text-blue-400 font-black uppercase tracking-widest px-2 py-1">+ В БЛОК</button>
            `;
            container.appendChild(div);
            const inner = div.querySelector('.superset-inner');
            if (data?.exercises) data.exercises.forEach(ex => renderExercise(inner, ex, true));
            else { renderExercise(inner, null, true); renderExercise(inner, null, true); }
        }

        function createSet(w = '', r = '', t = '00:00') {
            const div = document.createElement('div');
            div.className = "flex items-center gap-3 bg-slate-900/80 border border-slate-800 rounded-xl px-4 py-2 w-fit";
            div.innerHTML = `
                <div class="flex items-center gap-1"><input type="text" readonly class="set-input font-bold" value="${w}" onclick="openDropdown(event, 'weight')"><span class="text-slate-600 text-[9px] font-black">КГ</span></div>
                <div class="w-px h-3 bg-slate-700"></div>
                <div class="flex items-center gap-1"><input type="text" readonly class="set-input font-bold" value="${r}" onclick="openDropdown(event, 'reps')"><span class="text-slate-600 text-[9px] font-black">ПОВТ</span></div>
                <div class="w-px h-3 bg-slate-700"></div>
                <input type="text" readonly class="set-input font-mono text-blue-400 font-bold w-12" value="${t}" onclick="openDropdown(event, 'exercise')">
                <button onclick="this.parentElement.remove(); autoSave();" class="text-slate-600 ml-1">&times;</button>
            `;
            return div;
        }

        // --- TEMPLATES LOGIC ---
        function saveSessionAsTemplate(sessionId) {
            const card = document.querySelector(`.day-card[data-id="${sessionId}"]`);
            const templates = JSON.parse(localStorage.getItem(TEMPLATE_KEY) || '[]');
            const newT = {
                id: Date.now().toString(),
                name: "Новый шаблон",
                weekday: card.querySelector('.weekday-value').textContent.trim(),
                totalTime: card.querySelector('[data-type="total-time"]').value,
                items: Array.from(card.querySelectorAll('.exercise-list > [data-type]')).map(el => parseExerciseElement(el))
            };
            templates.push(newT);
            localStorage.setItem(TEMPLATE_KEY, JSON.stringify(templates));
            showToast("Шаблон сохранен");
        }

        function renderTemplateList() {
            const list = document.getElementById('templateList');
            const templates = JSON.parse(localStorage.getItem(TEMPLATE_KEY) || '[]');
            list.innerHTML = '';
            if (templates.length === 0) { list.innerHTML = '<p class="text-center text-slate-500 py-10">Библиотека пуста</p>'; return; }
            
            templates.forEach(t => {
                const card = document.createElement('div');
                card.className = "template-card";
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1 mr-4">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-[9px] font-black text-blue-500 uppercase bg-blue-500/10 px-2 py-0.5 rounded">${t.weekday}</span>
                            </div>
                            <input type="text" class="template-name-input" value="${t.name}" onkeydown="handleTemplateNameKey(event, '${t.id}')">
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="applyTemplateById('${t.id}')" class="bg-blue-600 text-white p-3 rounded-2xl">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
                            </button>
                            <button onclick="deleteTemplate('${t.id}')" class="text-slate-500 hover:text-red-400 p-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function handleTemplateNameKey(e, templateId) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const templates = JSON.parse(localStorage.getItem(TEMPLATE_KEY) || '[]');
                const idx = templates.findIndex(t => t.id === templateId);
                if (idx !== -1) {
                    templates[idx].name = e.target.value.trim() || "Без названия";
                    localStorage.setItem(TEMPLATE_KEY, JSON.stringify(templates));
                    e.target.blur();
                    showToast("Название обновлено");
                }
            }
        }

        function applyTemplateById(id) {
            const t = JSON.parse(localStorage.getItem(TEMPLATE_KEY) || '[]').find(x => x.id === id);
            if (!t) return;
            const card = document.querySelector(`.day-card[data-id="${activeSessionIdForTemplate}"]`);
            card.querySelector('.weekday-value').textContent = t.weekday;
            card.querySelector('[data-type="total-time"]').value = t.totalTime;
            const list = card.querySelector('.exercise-list');
            list.innerHTML = '';
            t.items.forEach(i => i.type === 'superset' ? renderSuperset(list, i) : renderExercise(list, i));
            closeModal('templateModal');
            autoSave();
        }

        function deleteTemplate(id) {
            let t = JSON.parse(localStorage.getItem(TEMPLATE_KEY) || '[]');
            localStorage.setItem(TEMPLATE_KEY, JSON.stringify(t.filter(x => x.id !== id)));
            renderTemplateList();
        }

        // --- UTILS ---
        function toggleCollapse(el) { el.nextElementSibling.classList.toggle('hidden'); }
        function openTemplateModal(id) { activeSessionIdForTemplate = id; renderTemplateList(); document.getElementById('templateModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showToast(txt) { const t = document.getElementById('toast'); t.textContent = txt; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2500); }
        function addSetToBtn(btn) { btn.previousElementSibling.appendChild(createSet()); autoSave(); }
        function addExerciseByBtn(btn) { renderExercise(btn.parentElement.parentElement.previousElementSibling); autoSave(); }
        function addSupersetByBtn(btn) { renderSuperset(btn.parentElement.parentElement.previousElementSibling); autoSave(); }
        function addExToSuperset(btn) { renderExercise(btn.previousElementSibling, null, true); autoSave(); }
        function deleteDay(id) { if(confirm('Удалить тренировку?')) { document.querySelector(`.day-card[data-id="${id}"]`)?.remove(); autoSave(); } }

        function openDropdown(e, type) {
            e.stopPropagation(); closeAllDropdowns();
            activeInput = e.currentTarget;
            const rect = activeInput.getBoundingClientRect();
            const dd = dropdowns[type];
            dd.style.top = `${rect.bottom + window.scrollY + 8}px`;
            dd.style.left = `${Math.min(rect.left, window.innerWidth - 200)}px`;
            dd.classList.add('active');
        }

        function handleSelection(val, type) {
            if (!activeInput) return;
            if (type === 'weekday') activeInput.textContent = val;
            else if (type === 'total' || type === 'ex') {
                const parts = (activeInput.value || "00:00").split(':');
                if (val.includes('h') || val.includes('m_first')) parts[0] = val.replace(/\D/g,'');
                else parts[1] = val.replace(/\D/g,'');
                activeInput.value = parts.join(':');
            } else if (type === 'w') {
                let curr = parseFloat(activeInput.value) || 0;
                let tens = Math.floor(curr / 10) * 10;
                let units = curr % 10;
                if (val.includes('tens')) tens = parseFloat(val.replace('tens',''));
                else units = parseFloat(val.replace('units',''));
                activeInput.value = tens + units;
            } else if (type === 'reps') activeInput.value = val;
            else if (type === 'date') {
                const parent = activeInput.closest('.date-container');
                if (val.includes('d_')) parent.querySelector('[data-type="d"]').textContent = val.replace('d_','');
                else if (val.includes('m_')) parent.querySelector('[data-type="m"]').textContent = val.replace('m_','');
                else parent.querySelector('[data-type="y"]').textContent = val.replace('y_','');
            }
            if (type === 'reps' || type === 'weekday' || (activeInput.classList.contains('set-input') && !type.includes('w'))) closeAllDropdowns();
            autoSave();
        }

        function closeAllDropdowns() { Object.values(dropdowns).forEach(d => d.classList.remove('active')); }
        document.addEventListener('click', closeAllDropdowns);

        function initDropdownOptions() {
            WEEKDAYS.forEach(w => addDDItem('weekdayList', w, 'weekday', w));
            for(let i=1; i<=31; i++) addDDItem('dayList', i, 'date', 'd_'+i);
            MONTHS.forEach(m => addDDItem('monthList', m, 'date', 'm_'+m));
            for(let i=2025; i<=2026; i++) addDDItem('yearList', i, 'date', 'y_'+i);
            for(let i=0; i<24; i++) addDDItem('totalHoursList', String(i).padStart(2,'0'), 'total', 'h'+i);
            for(let i=0; i<60; i++) addDDItem('totalMinList', String(i).padStart(2,'0'), 'total', 'm'+i);
            for(let i=0; i<60; i++) addDDItem('minList', String(i).padStart(2,'0'), 'ex', 'm_first'+i);
            for(let i=0; i<60; i++) addDDItem('secList', String(i).padStart(2,'0'), 'ex', 's'+i);
            for(let i=0; i<=250; i+=10) addDDItem('tensList', i, 'w', 'tens'+i);
            for(let i=0; i<10; i+=0.5) addDDItem('unitsList', i, 'w', 'units'+i);
            for(let i=1; i<=50; i++) addDDItem('repsList', i, 'reps', i);
        }

        function addDDItem(targetId, label, type, val) {
            const div = document.createElement('div');
            div.className = "dropdown-item";
            div.textContent = label;
            div.onclick = (e) => { e.stopPropagation(); handleSelection(String(val), type); };
            document.getElementById(targetId).appendChild(div);
        }

        function autoSave() {
            sortDayCardsInDom();
            const days = Array.from(document.querySelectorAll('.day-card')).map(card => ({
                id: card.dataset.id,
                dateObj: {
                    d: card.querySelector('[data-type="d"]').textContent.trim(),
                    m: card.querySelector('[data-type="m"]').textContent.trim(),
                    y: card.querySelector('[data-type="y"]').textContent.trim(),
                    wd: card.querySelector('.weekday-value').textContent.trim()
                },
                totalTime: card.querySelector('[data-type="total-time"]').value,
                items: Array.from(card.querySelectorAll('.exercise-list > [data-type]')).map(el => parseExerciseElement(el))
            }));
            const sortedDays = sortSessionsByDate(days);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sortedDays));
        }

        function parseExerciseElement(el) {
            if (el.dataset.type === 'superset') return { type: 'superset', exercises: Array.from(el.querySelectorAll('.superset-inner > [data-type="exercise"]')).map(ex => parseEx(ex)) };
            return { type: 'exercise', ...parseEx(el) };
        }

        function parseEx(el) {
            return {
                name: el.querySelector('.editable').textContent.trim(),
                sets: Array.from(el.querySelectorAll('.sets-container > div')).map(s => {
                    const inputs = s.querySelectorAll('input');
                    return { w: inputs[0].value, r: inputs[1].value, t: inputs[2].value };
                })
            };
        }

        async function loadFromStorage() {
            const gitHubData = await loadDataFromGitHub();
            if (gitHubData?.workouts && gitHubData?.templates) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(gitHubData.workouts));
                localStorage.setItem(TEMPLATE_KEY, JSON.stringify(gitHubData.templates));
                showToast("Данные загружены из GitHub");
            }

            const data = sortSessionsByDate(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
            document.getElementById('daysContainer').innerHTML = '';
            if (data.length > 0) data.forEach(d => addDay(d, false));
            else addDay(null, true);
        }

        // Analytics (simplified for this version)
        function renderAnalytics() {
            const data = sortSessionsByDate(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
            const body = document.getElementById('analyticsBody');
            body.innerHTML = '';
            data.forEach(session => {
                session.items.forEach(item => {
                    const exercises = item.type === 'superset' ? item.exercises : [item];
                    exercises.forEach(ex => {
                        const row = document.createElement('tr');
                        row.className = "border-b border-slate-800/30";
                        row.innerHTML = `
                            <td class="p-4 text-slate-500">${session.dateObj.d} ${session.dateObj.m}</td>
                            <td class="p-4 text-white font-bold">${ex.name || '---'}</td>
                            <td class="p-4 text-slate-400 text-[10px]">${ex.sets.map(s => `${s.w}x${s.r}`).join(', ')}</td>
                        `;
                        body.appendChild(row);
                    });
                });
            });
        }

        function sessionDateToTimestamp(session) {
            const d = Number(session?.dateObj?.d) || 1;
            const m = MONTH_INDEX[session?.dateObj?.m] ?? 0;
            const y = Number(session?.dateObj?.y) || new Date().getFullYear();
            return new Date(y, m, d).getTime();
        }

        function sortSessionsByDate(sessions = []) {
            return [...sessions].sort((a, b) => sessionDateToTimestamp(b) - sessionDateToTimestamp(a));
        }

        function sortDayCardsInDom() {
            const container = document.getElementById('daysContainer');
            const cards = Array.from(container.querySelectorAll('.day-card'));
            cards.sort((a, b) => {
                const aSession = {
                    dateObj: {
                        d: a.querySelector('[data-type="d"]').textContent.trim(),
                        m: a.querySelector('[data-type="m"]').textContent.trim(),
                        y: a.querySelector('[data-type="y"]').textContent.trim()
                    }
                };
                const bSession = {
                    dateObj: {
                        d: b.querySelector('[data-type="d"]').textContent.trim(),
                        m: b.querySelector('[data-type="m"]').textContent.trim(),
                        y: b.querySelector('[data-type="y"]').textContent.trim()
                    }
                };
                return sessionDateToTimestamp(bSession) - sessionDateToTimestamp(aSession);
            });
            cards.forEach(card => container.appendChild(card));
        }

        function getGitHubSyncConfig() {
            return JSON.parse(localStorage.getItem(GITHUB_SYNC_KEY) || 'null');
        }

        function setGitHubSyncConfig(cfg) {
            githubSyncConfig = cfg;
            localStorage.setItem(GITHUB_SYNC_KEY, JSON.stringify(cfg));
        }

        async function handleGitHubSyncClick() {
            if (!githubSyncConfig) {
                const owner = prompt('GitHub owner (например: username):');
                const repo = prompt('GitHub repo (например: TrainLog):');
                const branch = prompt('Ветка для сохранения:', 'main') || 'main';
                const token = prompt('GitHub token (repo scope):');
                if (!owner || !repo || !token) {
                    showToast('Синхронизация отменена');
                    return;
                }
                setGitHubSyncConfig({ owner, repo, branch, token, path: GITHUB_DATA_FILE });
            }
            const payload = {
                workouts: sortSessionsByDate(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')),
                templates: JSON.parse(localStorage.getItem(TEMPLATE_KEY) || '[]')
            };
            await saveDataToGitHub(payload);
        }

        async function loadDataFromGitHub() {
            if (!githubSyncConfig) return null;
            const { owner, repo, branch, token, path } = githubSyncConfig;
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${encodeURIComponent(branch)}`;
            try {
                const res = await fetch(url, {
                    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
                });
                if (!res.ok) return null;
                const json = await res.json();
                const decoded = decodeBase64Utf8(json.content || '');
                return JSON.parse(decoded);
            } catch {
                return null;
            }
        }

        async function saveDataToGitHub(payload) {
            if (!githubSyncConfig) return;
            const { owner, repo, branch, token, path } = githubSyncConfig;
            const baseUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const getRes = await fetch(`${baseUrl}?ref=${encodeURIComponent(branch)}`, {
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
            });
            let sha;
            if (getRes.ok) {
                const existing = await getRes.json();
                sha = existing.sha;
            }

            const body = {
                message: `Update ${path} from TrainLog`,
                branch,
                content: encodeBase64Utf8(JSON.stringify({ ...payload, exportDate: new Date().toISOString() }, null, 2))
            };
            if (sha) body.sha = sha;

            const putRes = await fetch(baseUrl, {
                method: 'PUT',
                headers: {
                    Authorization: `token ${token}`,
                    Accept: 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (putRes.ok) showToast(`Сохранено в ${path} (GitHub)`);
            else showToast('Ошибка сохранения в GitHub');
        }

        function encodeBase64Utf8(str) {
            const bytes = new TextEncoder().encode(str);
            let binary = '';
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        function decodeBase64Utf8(base64) {
            const binary = atob(base64.replace(/\n/g, ''));
            const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
            return new TextDecoder().decode(bytes);
        }
        function updateAnalyticsChart() {}
    </script>
