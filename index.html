<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker - File Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="month_themes.css">
</head>

<body class="min-h-screen pb-20">

    <div id="toast">Успешно!</div>
    <!-- Hidden input for file import -->
    <input type="file" id="fileImportInput" class="hidden" accept=".json" onchange="importData(event)">
    <input type="date" id="nativeDatePicker" class="hidden" aria-hidden="true">

    <!-- Dropdowns -->
    <div id="dateDropdown" class="custom-dropdown">
        <div class="dropdown-column" style="min-width: 60px;" id="dayList"></div>
        <div class="dropdown-column" style="min-width: 100px;" id="monthList"></div>
        <div class="dropdown-column" style="min-width: 80px;" id="yearList"></div>
    </div>
    <div id="weekdayDropdown" class="custom-dropdown">
        <div class="dropdown-column" style="min-width: 150px;" id="weekdayList"></div>
    </div>
    <div id="totalTimeDropdown" class="custom-dropdown">
        <div class="dropdown-column" id="totalHoursList"></div>
        <div class="dropdown-column" id="totalMinList"></div>
    </div>
    <div id="exerciseTimeDropdown" class="custom-dropdown">
        <div class="dropdown-column" id="minList"></div>
        <div class="dropdown-column" id="secList"></div>
    </div>
    <div id="weightDropdown" class="custom-dropdown">
        <div class="dropdown-column" style="min-width: 75px;" id="tensList"></div>
        <div class="dropdown-column" style="min-width: 75px;" id="unitsList"></div>
    </div>
    <div id="repsDropdown" class="custom-dropdown">
        <div class="dropdown-column" style="min-width: 80px;" id="repsList"></div>
    </div>

    <nav
        class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-300/70 px-3 sm:px-4 py-3 sm:py-4 mb-5 sm:mb-6">
        <div class="max-w-xl mx-auto flex flex-col gap-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-600/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline>
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold uppercase tracking-tight text-slate-800">Train<span
                            class="text-blue-600">Log</span></h1>
                </div>

                <div class="top-actions flex flex-wrap items-center justify-end gap-1.5 sm:gap-2">
                    <!-- File Actions -->
                    <button onclick="exportData()" title="Экспорт в файл"
                        class="p-2 text-slate-500 hover:text-slate-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <button onclick="triggerImport()" title="Импорт из файла"
                        class="p-2 text-slate-500 hover:text-slate-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </button>
                    <button onclick="connectRepoFile()" title="Подключить файл в корне репозитория"
                        class="p-2 text-slate-500 hover:text-slate-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6M8 4h8a2 2 0 012 2v12a2 2 0 01-2 2H8a2 2 0 01-2-2V6a2 2 0 012-2z" />
                        </svg>
                    </button>
                    <button onclick="validateGitHubSync()" title="Проверить GitHub Sync"
                        class="p-2 text-slate-500 hover:text-slate-900 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 .5C5.65.5.5 5.65.5 12A11.5 11.5 0 0 0 8.36 22.9c.58.1.8-.25.8-.57v-2.1c-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.04-.7.08-.68.08-.68 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.67 1.25 3.32.95.1-.74.4-1.25.72-1.53-2.55-.3-5.23-1.27-5.23-5.66 0-1.25.45-2.26 1.17-3.06-.12-.29-.5-1.47.12-3.06 0 0 .96-.3 3.15 1.17a10.8 10.8 0 0 1 5.74 0c2.2-1.48 3.16-1.17 3.16-1.17.62 1.6.24 2.77.12 3.06.73.8 1.17 1.81 1.17 3.06 0 4.4-2.69 5.36-5.25 5.65.42.37.78 1.08.78 2.2v3.25c0 .32.21.68.8.57A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z" />
                        </svg>
                    </button>
                    <button onclick="downloadFromGitHub()" title="Загрузить из GitHub"
                        class="p-2 text-slate-500 hover:text-slate-900 transition-colors text-xs font-black">↓GH</button>
                    <button onclick="uploadToGitHub()" title="Сохранить в GitHub"
                        class="p-2 text-slate-500 hover:text-slate-900 transition-colors text-xs font-black">↑GH</button>
                    <div class="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>
                    <div class="group-toggle flex bg-white/75 p-1 rounded-xl border border-slate-300">
                        <button id="btnLog" onclick="switchRoom('log')"
                            class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white">Лог</button>
                        <button id="btnTable" onclick="switchRoom('table')"
                            class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500">Аналитика</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4">
        <div id="roomLog" class="room active space-y-4">
            <div class="flex justify-between items-center mb-6">
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-widest">Твоя активность</p>
                <button onclick="addDay()"
                    class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-blue-600/20 active:scale-95 transition-all">
                    + Новая сессия
                </button>
            </div>
            <div id="daysContainer" class="space-y-4"></div>
        </div>

        <div id="roomTable" class="room space-y-6">
            <div class="rounded-[32px] border border-slate-200 shadow-xl p-4 sm:p-6 light-surface">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-sm font-black uppercase tracking-widest text-blue-500">Прогресс</h2>
                    <select id="chartExerciseSelect" onchange="updateAnalyticsChart()"
                        class="bg-white border border-slate-300 text-slate-700 text-[11px] font-bold py-1.5 px-4 rounded-xl outline-none min-w-[140px]"></select>
                </div>
                <div class="relative h-[240px] w-full">
                    <canvas id="progressionChart"></canvas>
                </div>
            </div>
            <div class="rounded-[32px] border border-slate-200 shadow-xl overflow-hidden light-surface">
                <div class="p-6 border-b border-slate-300/70">
                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-700">История</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-100 text-slate-500 uppercase font-black">
                            <tr>
                                <th class="p-4">Дата</th>
                                <th class="p-4">Упражнение</th>
                                <th class="p-4">Результат</th>
                            </tr>
                        </thead>
                        <tbody id="analyticsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Template Library Modal -->
    <div id="templateModal" class="modal-overlay">
        <div
            class="bg-white/95 rounded-[30px] border border-slate-200/90 max-w-2xl w-full mx-3 sm:mx-4 overflow-hidden flex flex-col max-h-[92vh] shadow-2xl backdrop-blur-xl">
            <div class="p-5 sm:p-6 border-b border-slate-200/90 flex justify-between items-start gap-4">
                <div>
                    <h3 class="text-xl sm:text-2xl font-bold text-slate-900">Библиотека шаблонов</h3>
                    <p class="text-slate-500 text-xs mt-2">Адаптивное меню: быстро редактируйте, дублируйте, удаляйте и
                        применяйте.</p>
                </div>
                <button onclick="closeModal('templateModal')"
                    class="text-slate-500 hover:text-slate-900 p-2 text-2xl leading-none">&times;</button>
            </div>
            <div id="templateList" class="p-4 sm:p-5 overflow-y-auto space-y-3 bg-slate-50/80"></div>
        </div>
    </div>
    <div id="mobileDateModal" class="modal-overlay">
        <div class="mobile-date-sheet">
            <h3 class="text-base font-extrabold text-slate-900 mb-2">Выберите дату</h3>
            <input type="date" id="mobileDateInput" class="mobile-date-input">
            <div class="mobile-date-actions">
                <button id="mobileDateCancelBtn" class="bg-slate-200 text-slate-700">Отмена</button>
                <button id="mobileDateTodayBtn" class="bg-blue-100 text-blue-700">Сегодня</button>
                <button id="mobileDateApplyBtn" class="bg-blue-600 text-white">Применить</button>
            </div>
        </div>
    </div>
    <script src="globals_and_storage.js"></script>
    <script src="ui_components.js"></script>
    <script src="app_logic.js"></script>
</body>

</html>
